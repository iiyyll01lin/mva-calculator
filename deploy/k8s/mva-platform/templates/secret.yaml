# =============================================================================
# Kubernetes Secret — Sensitive configuration values
# =============================================================================
# IMPORTANT: This template renders a placeholder Secret for documentation
# purposes only.  In production, populate real values via one of:
#   1. External Secrets Operator (recommended):
#        aws secretsmanager / GCP Secret Manager / Vault → K8s Secret
#   2. Sealed Secrets (Bitnami):
#        kubeseal --cert ... < secret.yaml > sealed-secret.yaml
#   3. Helm --set with a CI/CD secrets manager (never commit plaintext values).
#
# Reference values are base64("REPLACE_ME") for visibility during dry-runs.
# Replace all REPLACE_ME occurrences before any real deployment.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mva-platform-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mva-platform.labels" . | nindent 4 }}
  annotations:
    # Signal to External Secrets Operator or Vault Agent to manage this secret.
    # Remove if managing manually.
    helm.sh/resource-policy: keep
type: Opaque
data:
  # Redis connection URL:  redis://:PASSWORD@mva-platform-redis-master:6379/0
  # Generate: echo -n "redis://:STRONG_PASSWORD@mva-platform-redis-master:6379/0" | base64
  redis-url: {{ "redis://:REPLACE_ME@mva-platform-redis-master:6379/0" | b64enc | quote }}

  # Redis standalone password (must match redis.auth.existingSecretPasswordKey).
  redis-password: {{ "REPLACE_ME_REDIS_PASSWORD" | b64enc | quote }}

  # JWT signing secret for the FastAPI auth layer (min 32 chars in production).
  jwt-secret-key: {{ "REPLACE_ME_JWT_SECRET_KEY_MIN_32_CHARS" | b64enc | quote }}

  # LLM provider API key (OpenAI / Azure OpenAI / local).
  llm-api-key: {{ "REPLACE_ME_LLM_API_KEY" | b64enc | quote }}
