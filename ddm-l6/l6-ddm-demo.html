                                                </td>
                                                <td className="p-1 text-right font-mono text-slate-400 text-xs bg-slate-800/30">
                                                    {Number.isFinite(Number(st?.dailyCapa)) ? Math.round(Number(st.dailyCapa)) : '-'}
                                                </td>
                                                <td className="p-1 text-right font-mono text-slate-400 text-xs bg-slate-800/30">
                                                    {Number.isFinite(Number(st?.weeklyCapa)) ? Math.round(Number(st.weeklyCapa)) : '-'}
                                                </td>
                                                <td className="p-1 text-right font-mono text-slate-400 text-xs bg-slate-800/30">
                                                    {Number.isFinite(Number(st?.monthlyCapa)) ? Math.round(Number(st.monthlyCapa)) : '-'}
                                                </td>

                                                {/* Extra Inputs */}
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={st?.touchTimeMin ?? ''}
                                                        onChange={(e) => updateStation(idx, { touchTimeMin: e.target.value === '' ? null : Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-touch-min-${idx}`}
                                                    />
                                                </td>
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={st?.handlingTimeSec ?? ''}
                                                        onChange={(e) => updateStation(idx, { handlingTimeSec: e.target.value === '' ? null : Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-handling-sec-${idx}`}
                                                    />
                                                </td>
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={st?.oneManMultiMachineCount ?? ''}
                                                        onChange={(e) => updateStation(idx, { oneManMultiMachineCount: e.target.value === '' ? null : Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-ommm-${idx}`}
                                                    />
                                                </td>
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={st?.timeMinPerCycle ?? ''}
                                                        onChange={(e) => updateStation(idx, { timeMinPerCycle: e.target.value === '' ? null : Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-time-min-per-cycle-${idx}`}
                                                    />
                                                </td>
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={st?.runPerDay ?? ''}
                                                        onChange={(e) => updateStation(idx, { runPerDay: e.target.value === '' ? null : Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-run-per-day-${idx}`}
                                                    />
                                                </td>

                                                <td className="p-1 text-right">
                                                    <button
                                                        onClick={() => deleteStation(idx)}
                                                        className="px-2 py-1 rounded text-xs font-semibold bg-red-900/50 hover:bg-red-900 text-red-200"
                                                        data-testid={`mva-l10-lte-delete-${idx}`}
                                                    >
                                                        Del
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                        {stations.length === 0 ? (
                                            <tr>
                                                <td colSpan={16} className="p-3 text-slate-500">No stations yet. Import CSV or click “+ Add Station”.</td>
                                            </tr>
                                        ) : null}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderLaborTimeEstimationL6 = () => {
                const header = l6LaborTimeEstimation?.header || {};
                const l6Utils = window.__MVA_MODULES?.l6MatrixUtils;
                const OFFICIAL_COLS = Array.isArray(l6Utils?.L6_OFFICIAL_PROCESS_COLUMNS)
                    ? l6Utils.L6_OFFICIAL_PROCESS_COLUMNS
                    : [
                        'SMT B/A', 'AOI(Before PCA/Off Line）', 'HI', 'T/U', 'Alignment', 'Router', 'GLUING', 'P/F',
                        'ICT2(MDA/I1000)', 'CPLD', 'ICT3', 'BSI', 'F/A(F/A1)', 'EMMC', 'FBT', 'F/A2', 'AutoScan',
                        'API', 'AOI(含复判）', '总检/目检', 'PK', 'X-ray', 'OQC', 'Total'
                    ];

                const segments = Array.isArray(l6LaborTimeEstimation?.segments)
                    ? l6LaborTimeEstimation.segments
                    : (Array.isArray(l6LaborTimeEstimation?.stations)
                        ? [{ id: 'l6-seg-fallback', name: 'Segment 1', stations: l6LaborTimeEstimation.stations }]
                        : []);

                const updateHeader = (patch) => {
                     setL6LaborTimeEstimation(prev => ({
                        ...(prev || {}),
                        header: { ...(prev?.header || {}), ...patch },
                        source: 'manual'
                    }));
                };

                const flatten = (segs) => {
                    const out = [];
                    for (const seg of (segs || [])) {
                        const list = Array.isArray(seg?.stations) ? seg.stations : [];
                        for (const st of list) out.push(st);
                    }
                    return out;
                };

                const updateSegments = (nextSegments) => {
                    const normalizedSegments = (Array.isArray(nextSegments) ? nextSegments : []).map((seg, segIdx) => {
                        const rawStations = Array.isArray(seg?.stations) ? seg.stations : [];
                        const ensuredRaw = l6Utils?.ensureL6StationsForColumns
                            ? l6Utils.ensureL6StationsForColumns({ stations: rawStations, idPrefix: `l6-station-${segIdx}` })
                            : rawStations;
                        const computedStations = ensuredRaw.map((s) => {
                            const dl = (s?.dlOnline === null || s?.dlOnline === undefined) ? null : Number(s.dlOnline);
                            const laborHc = (Number.isFinite(dl) ? dl : (Number.isFinite(Number(s?.laborHc)) ? Number(s.laborHc) : 0));
                            return calcL6StationComputed({ ...s, dlOnline: dl ?? s?.dlOnline, laborHc });
                        });
                        return { ...seg, stations: computedStations };
                    });

                    const flat = flatten(normalizedSegments);
                    setL6LaborTimeEstimation(prev => ({
                        ...(prev || { meta: {}, source: 'manual' }),
                        segments: normalizedSegments,
                        stations: flat,
                        source: 'manual',
                    }));
                    applyL6StationsToDirectLaborRows(flat);
                };

                const addSegment = (presetName = null) => {
                    const name = presetName || `Segment ${segments.length + 1}`;
                    const seedStationsRaw = l6Utils?.ensureL6StationsForColumns
                        ? l6Utils.ensureL6StationsForColumns({ stations: [] })
                        : [];
                    const seedStations = seedStationsRaw.map((s) => calcL6StationComputed(s));
                    const next = [...segments, { id: `l6-seg-${Date.now()}`, name, stations: seedStations }];
                    updateSegments(next);
                };

                const addStationToSegment = (segIdx, stationName = null, seed = null) => {
                    const next = segments.map((s, i) => {
                        if (i !== segIdx) return s;
                        const list = Array.isArray(s?.stations) ? s.stations : [];
                        const idx = list.length;
                        const raw = {
                            id: `l6-station-manual-${Date.now()}-${segIdx}-${idx}`,
                            stationNo: idx + 1,
                            name: stationName || `New Process ${idx + 1}`,
                            laborHc: 0,
                            parallelStations: 1,
                            cycleTimeSec: null,
                            allowanceRate: 0,
                            stdManHours: null,
                            vpy: null,
                            shiftRate: null,
                            dlOnline: null,
                        };
                        const merged = (seed && typeof seed === 'object') ? { ...raw, ...seed } : raw;
                        return { ...s, stations: [...list, calcL6StationComputed(merged)] };
                    });
                    updateSegments(next);
                };

                const updateStation = (segIdx, stIdx, patch) => {
                    const next = segments.map((s, i) => {
                        if (i !== segIdx) return s;
                        const list = Array.isArray(s?.stations) ? s.stations : [];
                        const nextStations = list.map((st, j) => {
                            if (j !== stIdx) return st;
                            const merged = { ...st, ...patch };
                            // Keep DL online and laborHc consistent.
                            if (merged?.dlOnline !== undefined) merged.laborHc = (merged.dlOnline === '' || merged.dlOnline === null) ? 0 : Number(merged.dlOnline) || 0;
                            return calcL6StationComputed(merged);
                        });
                        return { ...s, stations: nextStations };
                    });
                    updateSegments(next);
                };

                const normalizeNameKey = (name) => {
                    try {
                        return String(name || '').normalize('NFKC').toLowerCase().replace(/\s+/g, '');
                    } catch {
                        return String(name || '').toLowerCase().replace(/\s+/g, '');
                    }
                };

                const updateStationByName = (segIdx, stationName, patch) => {
                    const targetKey = normalizeNameKey(stationName);
                    const next = segments.map((s, i) => {
                        if (i !== segIdx) return s;
                        const list = Array.isArray(s?.stations) ? s.stations : [];
                        const nextStations = list.map((st) => {
                            const k = normalizeNameKey(st?.name);
                            if (k !== targetKey) return st;
                            const merged = { ...st, ...patch };
                            if (merged?.dlOnline !== undefined) merged.laborHc = (merged.dlOnline === '' || merged.dlOnline === null) ? 0 : Number(merged.dlOnline) || 0;
                            return calcL6StationComputed(merged);
                        });
                        return { ...s, stations: nextStations };
                    });
                    updateSegments(next);
                };

                const ensureSegmentColumns = (seg) => {
                    const stations = Array.isArray(seg?.stations) ? seg.stations : [];
                    const ensured = l6Utils?.ensureL6StationsForColumns
                        ? l6Utils.ensureL6StationsForColumns({ stations })
                        : stations;
                    return { ...seg, stations: ensured };
                };

                const MATRIX_ROWS = [
                    { key: 'stdManHours', label: '標準工時 (人*時)' },
                    { key: 'allowanceRate', label: '寬放率(%)' },
                    { key: 'parallelStations', label: '治具' },
                    { key: 'cycleTimeSec', label: 'Cycle time(s/pcs)' },
                    { key: 'vpy', label: 'VPY(%)' },
                    { key: 'shiftRate', label: 'Shift rate' },
                    { key: 'dlOnline', label: 'DL online' },
                ];

                const deleteStation = (segIdx, stIdx) => {
                    const next = segments.map((s, i) => {
                        if (i !== segIdx) return s;
                        const list = Array.isArray(s?.stations) ? s.stations : [];
                        return { ...s, stations: list.filter((_, j) => j !== stIdx) };
                    });
                    updateSegments(next);
                };

                return (
                    <div className="space-y-6 animate-in fade-in duration-500">
                        <SectionHeader
                            title="Labor Time Estimation — L6"
                            description="Template page 7 (L6). Supports Full Header Parity + Segment matrix editing."
                        />

                        <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-3">
                            <div>
                                <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Import (L6 labor time estimation CSV)</div>
                                <div className="text-xs text-slate-500 mt-1">Imports L6 station HC/CT/allowance/jig and computes station UPH. Also parses header info (Category, Demand, etc).</div>
                            </div>
                            <input
                                type="file"
                                accept=".csv,text/csv"
                                onChange={(e) => importL6LaborTimeEstimationCsv(e.target.files?.[0])}
                                data-testid="mva-import-l6-labor-time-estimation"
                                className="block w-full text-sm text-slate-300 file:mr-3 file:py-2 file:px-3 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-slate-700 file:text-slate-100 hover:file:bg-slate-600"
                            />
                            <div className="text-xs text-slate-500">
                                Parsed stations: <span className="font-mono text-slate-200" data-testid="mva-l6-lte-count">{Array.isArray(l6LaborTimeEstimation?.stations) ? l6LaborTimeEstimation.stations.length : 0}</span>
                                {' '}({l6LaborTimeEstimation?.source || 'manual'})
                            </div>
                        </div>

                        {/* 1. By Product */}
                        <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">
                            <h3 className="font-semibold text-slate-300 border-b border-slate-700 pb-2">By Product</h3>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                               <InputField label="PCB 参数(mm)" value={header.pcbParams || ''} onChange={v => updateHeader({ pcbParams: v })} inputProps={{ 'data-testid': 'mva-l6-header-pcb' }} />
                               <InputField label="PRINTING" value={header.printing || ''} onChange={v => updateHeader({ printing: v })} inputProps={{ 'data-testid': 'mva-l6-header-printing' }} />
                               <InputField label="Line Change" value={header.lineChange || ''} onChange={v => updateHeader({ lineChange: v })} inputProps={{ 'data-testid': 'mva-l6-header-line-change' }} />
                               <InputField label="ICT→FBT" value={header.ictToFbt || ''} onChange={v => updateHeader({ ictToFbt: v })} inputProps={{ 'data-testid': 'mva-l6-header-ict-fbt' }} />
                            </div>
                        </div>

                        {/* 1. Header Inputs */}
                        <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">
                            <h3 className="font-semibold text-slate-300 border-b border-slate-700 pb-2">L6 Header Parameters</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <InputField label="Category" value={header.category || ''} onChange={v => updateHeader({ category: v })} inputProps={{ 'data-testid': 'mva-l6-header-category' }} />
                                <InputField label="Production Line" value={header.productionLine || ''} onChange={v => updateHeader({ productionLine: v })} inputProps={{ 'data-testid': 'mva-l6-header-production-line' }} />
                                <div className="p-3 bg-slate-900/30 border border-slate-700 rounded">
                                     <div className="text-xs text-slate-400 mb-2 font-semibold">SMT - Side A</div>
                                     <div className="flex gap-2">
                                        <InputField label="Big" value={header.smtSideA?.bigParts || ''} onChange={v => updateHeader({ smtSideA: { ...header.smtSideA, bigParts: v } })} type="number" />
                                        <InputField label="Small" value={header.smtSideA?.smallParts || ''} onChange={v => updateHeader({ smtSideA: { ...header.smtSideA, smallParts: v } })} type="number" />
                                     </div>
                                </div>
                                <div className="p-3 bg-slate-900/30 border border-slate-700 rounded">
                                     <div className="text-xs text-slate-400 mb-2 font-semibold">SMT - Side B</div>
                                     <div className="flex gap-2">
                                        <InputField label="Big" value={header.smtSideB?.bigParts || ''} onChange={v => updateHeader({ smtSideB: { ...header.smtSideB, bigParts: v } })} type="number" />
                                        <InputField label="Small" value={header.smtSideB?.smallParts || ''} onChange={v => updateHeader({ smtSideB: { ...header.smtSideB, smallParts: v } })} type="number" />
                                     </div>
                                </div>
                                <div className="p-3 bg-slate-900/30 border border-slate-700 rounded">
                                     <div className="text-xs text-slate-400 mb-2 font-semibold">HI Parts</div>
                                     <div className="flex gap-2">
                                        <InputField label="Resistor" value={header.hi?.resistor || ''} onChange={v => updateHeader({ hi: { ...header.hi, resistor: v } })} type="number" />
                                        <InputField label="DIMM" value={header.hi?.dimm || ''} onChange={v => updateHeader({ hi: { ...header.hi, dimm: v } })} type="number" />
                                     </div>
                                </div>
                                                                <InputField label="Annual Demand" value={header.annualDemand || ''} onChange={v => updateHeader({ annualDemand: Number(v) })} type="number" inputProps={{ 'data-testid': 'mva-l6-header-annual-demand' }} />
                                                                <InputField label="Monthly Demand" value={header.monthlyDemand || ''} onChange={v => updateHeader({ monthlyDemand: Number(v) })} type="number" inputProps={{ 'data-testid': 'mva-l6-header-monthly-demand' }} />
                                                                    <InputField label="連板數 (Multi-Panel Qty)" value={header.multiPanelQty || ''} onChange={v => updateHeader({ multiPanelQty: Number(v) })} type="number" inputProps={{ 'data-testid': 'mva-l6-header-multi-panel-qty' }} />
                                                                <InputField label="Line Capability/Shift" value={header.lineCapabilityPerShift || ''} onChange={v => updateHeader({ lineCapabilityPerShift: Number(v) })} type="number" inputProps={{ 'data-testid': 'mva-l6-header-line-capability' }} />
                                                                <InputField label="Ex-Rate (RMB/USD)" value={header.exRateRmbUsd || ''} onChange={v => updateHeader({ exRateRmbUsd: Number(v) })} type="number" inputProps={{ 'data-testid': 'mva-l6-header-ex-rate' }} />
                                                                <InputField label="Service Hourly Wage" value={header.serviceHourlyWage || ''} onChange={v => updateHeader({ serviceHourlyWage: Number(v) })} type="number" inputProps={{ 'data-testid': 'mva-l6-header-service-wage' }} />
                            </div>
