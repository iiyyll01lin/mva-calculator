        // --- MVA helpers (loaded via dynamic import to keep this HTML portable) ---
        // In Babel-in-browser, we can't use top-level import statements.
        // We'll lazy-load ESM helpers and fall back to local calculations if load fails.
        let __mva = null;
        async function loadMvaHelpers() {
            if (__mva) return __mva;
            try {
                if (window.__MVA_MODULES?.mvaCalc) {
                    __mva = window.__MVA_MODULES.mvaCalc;
                    return __mva;
                }
                __mva = await import('./mva/mvaCalc.js');
                return __mva;
            } catch (e) {
                console.warn('Failed to load mva helpers, using fallback.', e);
                __mva = {
                    laborCostPerUnit: ({ hourlyRate, headcount, lineUph, efficiency }) => {
                        const rate = Number(hourlyRate) || 0;
                        const hc = Number(headcount) || 0;
                        const uph = Number(lineUph) || 0;
                        const eff = Number(efficiency) || 0;
                        if (rate < 0 || hc < 0 || uph <= 0 || eff <= 0) return 0;
                        return (rate * hc) / (uph * eff);
                    },
                    monthlyVolumeFromPlan: ({ rfqQtyPerMonth, lineUph, shiftsPerDay, hoursPerShift, workDaysPerMonth, utilization = 1 }) => {
                        const rfq = Number(rfqQtyPerMonth) || 0;
                        if (rfq > 0) return rfq;
                        const uph = Number(lineUph) || 0;
                        const shifts = Number(shiftsPerDay) || 0;
                        const hours = Number(hoursPerShift) || 0;
                        const days = Number(workDaysPerMonth) || 0;
                        const util = Number(utilization) || 1;
                        return uph * shifts * hours * days * util;
                    },
                    overheadPerUnit: ({ equipmentDepreciationPerMonth, equipmentMaintenanceRatio, spaceMonthlyCost, powerCostPerUnit, monthlyVolume }) => {
                        const dep = Number(equipmentDepreciationPerMonth) || 0;
                        const mr = Number(equipmentMaintenanceRatio) || 0;
                        const space = Number(spaceMonthlyCost) || 0;
                        const power = Number(powerCostPerUnit) || 0;
                        const vol = Number(monthlyVolume) || 0;
                        if (vol <= 0) {
                            return {
                                equipmentDepPerUnit: 0,
                                equipmentMaintPerUnit: 0,
                                spacePerUnit: 0,
                                powerPerUnit: power,
                                totalOverheadPerUnit: power,
                            };
                        }
                        const equipmentDepPerUnit = dep / vol;
                        const equipmentMaintPerUnit = (dep * mr) / vol;
                        const spacePerUnit = space / vol;
                        const powerPerUnit = power;
                        return {
                            equipmentDepPerUnit,
                            equipmentMaintPerUnit,
                            spacePerUnit,
                            powerPerUnit,
                            totalOverheadPerUnit: equipmentDepPerUnit + equipmentMaintPerUnit + spacePerUnit + powerPerUnit,
                        };
                    },
                    computeMvaMvp: ({ directLaborRows, indirectLaborRows, rates, overhead, lineUph, monthlyVolume }) => {
                        const dlRate = rates?.directLaborHourlyRate ?? 0;
                        const idlRate = rates?.indirectLaborHourlyRate ?? 0;
                        const eff = rates?.efficiency ?? 0;
                        const dlBreakdown = (directLaborRows || []).map((row) => {
                            const uph = row?.uphSource === 'override' ? row?.overrideUph : lineUph;
                            return {
                                id: row?.id,
                                name: row?.name,
                                headcount: row?.headcount,
                                uphUsed: uph,
                                costPerUnit: __mva.laborCostPerUnit({ hourlyRate: dlRate, headcount: row?.headcount, lineUph: uph, efficiency: eff })
                            };
                        });
                        const idlBreakdown = (indirectLaborRows || []).map((row) => {
                            const uph = row?.uphSource === 'override' ? row?.overrideUph : lineUph;
                            const alloc = (typeof row?.allocationPercent === 'number') ? row.allocationPercent : 1;
                            const effectiveHeadcount = (Number(row?.headcount) || 0) * alloc;
                            return {
                                id: row?.id,
                                name: row?.name,
                                headcount: effectiveHeadcount,
                                rawHeadcount: row?.headcount,
                                allocationPercent: alloc,
                                uphUsed: uph,
                                costPerUnit: __mva.laborCostPerUnit({ hourlyRate: idlRate, headcount: effectiveHeadcount, lineUph: uph, efficiency: eff })
                            };
                        });
                        const dlPerUnit = dlBreakdown.reduce((sum, r) => sum + (Number(r.costPerUnit) || 0), 0);
                        const idlPerUnit = idlBreakdown.reduce((sum, r) => sum + (Number(r.costPerUnit) || 0), 0);
                        const overheadComputed = __mva.overheadPerUnit({
                            equipmentDepreciationPerMonth: overhead?.equipmentDepreciationPerMonth,
                            equipmentMaintenanceRatio: overhead?.equipmentMaintenanceRatio,
                            spaceMonthlyCost: overhead?.spaceMonthlyCost,
                            powerCostPerUnit: overhead?.powerCostPerUnit,
                            monthlyVolume,
                        });
                        const totalPerUnit = dlPerUnit + idlPerUnit + (Number(overheadComputed.totalOverheadPerUnit) || 0);
                        return { dlBreakdown, idlBreakdown, dlPerUnit, idlPerUnit, overhead: overheadComputed, totalPerUnit };
                    },
                    materialAttritionPerUnit: ({ bomCostPerUnit, attritionRate }) => {
                        const bom = Math.max(0, Number(bomCostPerUnit) || 0);
                        const rate = Math.min(1, Math.max(0, Number(attritionRate) || 0));
                        return bom * rate;
                    },
                    consumablesPerUnit: ({ consumablesCostPerUnit }) => {
                        return Math.max(0, Number(consumablesCostPerUnit) || 0);
                    },
                    sgaPerUnit: ({ corporateBurdenPerMonth, siteMaintenancePerMonth, itSecurityPerMonth, monthlyVolume }) => {
                        const corp = Math.max(0, Number(corporateBurdenPerMonth) || 0);
                        const site = Math.max(0, Number(siteMaintenancePerMonth) || 0);
                        const it = Math.max(0, Number(itSecurityPerMonth) || 0);
                        const vol = Math.max(0, Number(monthlyVolume) || 0);
                        const total = corp + site + it;
                        if (vol <= 0) {
                            return {
                                corporateBurdenPerUnit: 0,
                                siteMaintenancePerUnit: 0,
                                itSecurityPerUnit: 0,
                                totalSgaPerUnit: 0,
                                totalSgaPerMonth: total,
                            };
                        }
                        return {
                            corporateBurdenPerUnit: corp / vol,
                            siteMaintenancePerUnit: site / vol,
                            itSecurityPerUnit: it / vol,
                            totalSgaPerUnit: total / vol,
                            totalSgaPerMonth: total,
                        };
                    },
                    profitPerUnit: ({ bcBomCostPerUnit, profitRate }) => {
                        const base = Math.max(0, Number(bcBomCostPerUnit) || 0);
                        const rate = Math.min(1, Math.max(0, Number(profitRate) || 0));
                        return base * rate;
                    },
                    iccPerUnit: ({ inventoryValuePerUnit, iccRate }) => {
                        const inv = Math.max(0, Number(inventoryValuePerUnit) || 0);
                        const rate = Math.min(1, Math.max(0, Number(iccRate) || 0));
                        return inv * rate;
                    },
                    yieldFactorFromInputs: ({ fpy, vpy }) => {
                        const clamp01 = (n) => Math.min(1, Math.max(0, Number(n) || 0));
                        const f = clamp01(fpy === null || fpy === undefined ? 1 : fpy);
                        const v = clamp01(vpy === null || vpy === undefined ? 1 : vpy);
                        return f * v;
                    },
                    applyYieldToLineUph: ({ lineUph, yieldFactor, strategy }) => {
                        const uph = Math.max(0, Number(lineUph) || 0);
                        const y = Math.min(1, Math.max(0, Number(yieldFactor) || 0));
                        const mode = String(strategy || 'ignore');
                        if (mode === 'apply_to_capacity') return uph * y;
                        return uph;
                    },
                    groupSumByField: (rows, { field, valueField = 'costPerUnit', unknownLabel = '(Unspecified)' } = {}) => {
                        const list = Array.isArray(rows) ? rows : [];
                        const byKey = new Map();
                        for (const r of list) {
                            const keyRaw = r?.[field];
                            const key = String(keyRaw ?? '').trim() || unknownLabel;
                            const v = Math.max(0, Number(r?.[valueField]) || 0);
                            byKey.set(key, (byKey.get(key) || 0) + v);
                        }
                        return Array.from(byKey.entries())
                            .map(([key, total]) => ({ key, total }))
                            .sort((a, b) => (b.total - a.total));
                    },
                    computeMvaFull: ({ directLaborRows, indirectLaborRows, rates, overhead, lineUph, monthlyVolume, materials, sga, profit, icc }) => {
                        const base = __mva.computeMvaMvp({ directLaborRows, indirectLaborRows, rates, overhead, lineUph, monthlyVolume });

                        const materialAttritionPerUnit = __mva.materialAttritionPerUnit({
                            bomCostPerUnit: materials?.bomCostPerUnit,
                            attritionRate: materials?.attritionRate,
                        });
                        const consumablesPerUnit = __mva.consumablesPerUnit({
                            consumablesCostPerUnit: materials?.consumablesCostPerUnit,
                        });
                        const sgaComputed = __mva.sgaPerUnit({
                            corporateBurdenPerMonth: sga?.corporateBurdenPerMonth,
                            siteMaintenancePerMonth: sga?.siteMaintenancePerMonth,
                            itSecurityPerMonth: sga?.itSecurityPerMonth,
                            monthlyVolume,
                        });
                        const profitPerUnit = __mva.profitPerUnit({
                            bcBomCostPerUnit: profit?.bcBomCostPerUnit,
                            profitRate: profit?.profitRate,
                        });
                        const iccPerUnit = __mva.iccPerUnit({
                            inventoryValuePerUnit: icc?.inventoryValuePerUnit,
                            iccRate: icc?.iccRate,
                        });

                        const totalPerUnit =
                            (Number(base.dlPerUnit) || 0) +
                            (Number(base.idlPerUnit) || 0) +
                            (Number(base.overhead?.totalOverheadPerUnit) || 0) +
                            (Number(materialAttritionPerUnit) || 0) +
                            (Number(consumablesPerUnit) || 0) +
                            (Number(sgaComputed.totalSgaPerUnit) || 0) +
                            (Number(profitPerUnit) || 0) +
                            (Number(iccPerUnit) || 0);

                        return {
                            ...base,
                            materialAttritionPerUnit,
                            consumablesPerUnit,
                            sga: sgaComputed,
                            profitPerUnit,
                            iccPerUnit,
                            totalPerUnit,
                        };
                    },
                };
                return __mva;
            }
        }

            const importLineStandardLibraryJson = async (file) => {

                const lib = await loadLineStandardLibrary();
                if (!lib?.parseLineStandardLibraryJson || !lib?.ensureUniqueName) {
                    alert('Line Standard library import helper not available.');
                    return;

                const text = await file.text();
                let parsed;
                try {
                    parsed = lib.parseLineStandardLibraryJson(text);
                } catch (e) {
                    alert(`Invalid Line Standard library JSON: ${String(e?.message || e)}`);
                    return;

                const incoming = Array.isArray(parsed?.standards) ? parsed.standards : [];
                if (incoming.length === 0) return;

                setEquipmentTemplates(prev => {
                    const prevList = Array.isArray(prev) ? prev : [];
                    const names = prevList.map(t => String(t?.name || '').trim()).filter(Boolean);

                        const uniqueName = lib.ensureUniqueName(names, st?.name);

                        return inflateLineStandardForUi({ ...st, name: uniqueName }, prevList.length + idx);

                    return [...prevList, ...appended];

            const saveLineStandardLibraryToLocalStorage = async () => {

                        name: t?.name,
                        source: t?.source,
                        equipmentCostPerMonth: t?.equipmentCostPerMonth,
                        equipmentList: Array.isArray(t?.equipmentList) ? t.equipmentList : [],
                    }));

            const loadLineStandardLibraryFromLocalStorage = async () => {

            const normalizeSpaceProcessName = (raw) => {

                if (!s) return '';
                const upper = s.toUpperCase();
                if (upper.includes('SMT')) return 'SMT';
                if (upper.includes('FBT') || upper.includes('FUNCTION')) return 'FBT';
                if (
                    upper.includes('NON-PROD') ||
                    upper.includes('NON PROD') ||
                    upper.includes('NONPROD') ||
                    upper.includes('OFFICE') ||
                    upper.includes('WAREHOUSE') ||
                    upper === 'WH' ||

            const splitFloorSpace4060Fallback = ({ totalFloorSqft, hiMode }) => {

                if (mode === 'FBT') return [{ process: 'SMT', areaSqft: smt }, { process: 'FBT', areaSqft: hi }];
                // default: split HI into F/A + FBT evenly

            const [mvaMaterials, setMvaMaterials] = useState({

            const [directLaborRows, setDirectLaborRows] = useState([

            const [indirectLaborRows, setIndirectLaborRows] = useState([

            // IDL UI mode separation: L10 (department-driven) vs L6 (role-matrix flattened)

            const effectiveIdlMode = useMemo(() => {

                const hasL6 = Array.isArray(idlRowsByMode?.L6) && idlRowsByMode.L6.length > 0;

            const normalizeIdlRowName = (mode, row) => {

            const [l10LaborTimeEstimation, setL10LaborTimeEstimation] = useState({

            // L6 labor time estimation (segments -> stations)
            const [l6LaborTimeEstimation, setL6LaborTimeEstimation] = useState({

            });

            const calcL10StationComputed = (st, meta) => {
                const cycleTimeSec = (st?.cycleTimeSec === null || st?.cycleTimeSec === undefined) ? null : Number(st.cycleTimeSec);
                const allowanceFactor = Number.isFinite(Number(st?.allowanceFactor)) ? Number(st.allowanceFactor) : 1;
                const parallelStations = Number.isFinite(Number(st?.parallelStations)) && Number(st.parallelStations) > 0 ? Number(st.parallelStations) : 1;
                const avgCycleTimeSec = (cycleTimeSec !== null && Number.isFinite(cycleTimeSec) && cycleTimeSec > 0)
                    ? (cycleTimeSec * allowanceFactor)
                    : null;
                const uph = (avgCycleTimeSec !== null && avgCycleTimeSec > 0)
                    ? (parallelStations * 3600) / avgCycleTimeSec
                    : null;

                const hoursPerShift = Number.isFinite(Number(meta?.hoursPerShift)) ? Number(meta.hoursPerShift) : null;
                const shiftsPerDay = Number.isFinite(Number(meta?.shiftsPerDay)) ? Number(meta.shiftsPerDay) : null;
                const workDaysPerWeek = Number.isFinite(Number(meta?.workDaysPerWeek)) ? Number(meta.workDaysPerWeek) : null;
                const workDaysPerMonth = Number.isFinite(Number(meta?.workDaysPerMonth)) ? Number(meta.workDaysPerMonth) : null;

                const perShiftCapa = (uph !== null && hoursPerShift !== null) ? (uph * hoursPerShift) : null;
                const dailyCapa = (perShiftCapa !== null && shiftsPerDay !== null) ? (perShiftCapa * shiftsPerDay) : null;
                const weeklyCapa = (dailyCapa !== null && workDaysPerWeek !== null) ? (dailyCapa * workDaysPerWeek) : null;
                const monthlyCapa = (dailyCapa !== null && workDaysPerMonth !== null) ? (dailyCapa * workDaysPerMonth) : null;

                return {
                    ...st,
                    cycleTimeSec, allowanceFactor, parallelStations, avgCycleTimeSec, uph,
                    perShiftCapa, dailyCapa, weeklyCapa, monthlyCapa
                };
            };

            const calcL6StationComputed = (st) => {
                const cycleTimeSec = (st?.cycleTimeSec === null || st?.cycleTimeSec === undefined) ? null : Number(st.cycleTimeSec);
                const allowanceRateRaw = (st?.allowanceRate === null || st?.allowanceRate === undefined) ? null : Number(st.allowanceRate);
                const allowanceRate = Number.isFinite(allowanceRateRaw) ? allowanceRateRaw : null;
                
                // L6 logic: allowanceRate can be > 1 (e.g. 1.15) or < 1 (e.g. 0.15). If < 1, means 15% adder -> 1.15 factor
                // But typically in this template: "寬放率(%)" e.g. 91.6, or 0.15
                let allowanceFactor = 1;
                if (allowanceRate !== null) {
                    if (allowanceRate > 2) { 
                        // Assuming percentage like 15 or 91 -> convert to factor? 
                        // Ambiguous in template. Let's assume it's like 0.15
                        allowanceFactor = 1 + (allowanceRate / 100);
                    } else if (allowanceRate > 0 && allowanceRate < 1) {
                         allowanceFactor = 1 + allowanceRate;
                    } else if (allowanceRate >= 1) {
                        allowanceFactor = allowanceRate;
                    }
                }

                const parallelStations = Number.isFinite(Number(st?.parallelStations)) && Number(st.parallelStations) > 0 ? Number(st.parallelStations) : 1;
                
                // stdManHours is "標準工時 (人*時)" which acts as a fundamental input or result.
                // If we have CycleTime, StdManHours ~ (HC * CT / 3600)? 
                // Or CT ~ (StdManHours * 3600)?
                // For now, treat stdManHours as Input-first if present, or derived.
                
                const avgCycleTimeSec = (cycleTimeSec !== null && Number.isFinite(cycleTimeSec) && cycleTimeSec > 0)
                    ? (cycleTimeSec * allowanceFactor)
                    : null;
                const uph = (avgCycleTimeSec !== null && avgCycleTimeSec > 0)
                    ? (parallelStations * 3600) / avgCycleTimeSec
                    : null;
                
                return { 
                    ...st, 
                    cycleTimeSec, 
                    allowanceRate, 
                    allowanceFactor, 
                    parallelStations, 
                    avgCycleTimeSec, 
                    uph,
                    // Pass-through L6 specific fields
                    stdManHours: st?.stdManHours,
                    vpy: st?.vpy,
                    shiftRate: st?.shiftRate,
                    dlOnline: st?.dlOnline
                };
            };

            const applyL10StationsToDirectLaborRows = (stations) => {
                const list = Array.isArray(stations) ? stations : [];
                if (list.length === 0) return;
                setDirectLaborRows(list.map((s, idx) => ({
                    id: `dl-l10-${idx}`,
                    name: s?.name || `Station ${idx + 1}`,
                    process: '',
                    headcount: Number(s?.laborHc) || 0,
                    uphSource: 'override',
                    overrideUph: (Number.isFinite(Number(s?.uph)) ? Number(s.uph) : null),
                })));
            };

            const applyL6StationsToDirectLaborRows = (stations) => {
                const inferProcess = (name) => {
                    const s = String(name || '').toLowerCase();
                    if (s.includes('smt')) return 'SMT';
                    if (s.includes('ict')) return 'ICT';
                    if (s.includes('fbt')) return 'FBT';
                    if (s.includes('pk') || s.includes('pack')) return 'PK';
                    if (s.includes('oqc')) return 'OQC';
                    if (s.includes('aoi') || s.includes('ao i') || s.includes('oai')) return 'AOI';
                    if (s.includes('x-ray') || s.includes('xray')) return 'X-Ray';
                    return '';
                };
                const list = (Array.isArray(stations) ? stations : []).filter((st) => {
                    const n = String(st?.name || '').trim().toLowerCase();
                    if (st?.isTotal) return false;
                    return n !== 'total';
                });
                if (list.length === 0) return;
                setDirectLaborRows(list.map((st, idx) => ({
                    id: `dl-l6-${idx}`,
                    name: st?.name || `Station ${idx + 1}`,
                    process: inferProcess(st?.name),
                    headcount: Number(st?.laborHc) || 0,
                    uphSource: 'override',
                    overrideUph: (Number.isFinite(Number(st?.uph)) ? Number(st.uph) : null),
                })));
            };

            // Confirm (OK/NG) metadata
            const [mvaConfirm, setMvaConfirm] = useState({
                decision: null, // 'OK' | 'NG' | null
                reviewer: '',
                comment: '',
                decidedAt: null,
            });

            // --- Calculations ---

            const simulationResults = useMemo(() => {
                // 1. Calculate Available Time & Demand
                const availableMinutesPerDay = (basicInfo.shiftsPerDay * basicInfo.hoursPerShift * 60) - (basicInfo.shiftsPerDay * basicInfo.breaksPerShiftMin);
                const availableSecondsPerWeek = availableMinutesPerDay * 60 * basicInfo.workDays;
                const taktTime = availableSecondsPerWeek / basicInfo.demandWeekly; // Seconds per board needed to meet demand

                // 2. Calculate Cycle Time per Step
                const stepResults = processSteps.map(step => {
                const machine = machines.find(m => m.group === step.process);
                if (!machine) return { ...step, cycleTime: 0, machineType: 'unknown', rate: 0 };

                let cycleTime = 0;
                let rawRate = machine.rate; // Units per hour
                let componentCount = 0;
                let oee = machine.type === 'placement' ? basicInfo.oeePlacement : basicInfo.oeeOthers;

                if (machine.type === 'placement') {
                    // Find BOM entries for this machine group and side
                    const bomEntries = bomMap.filter(b => b.machineGroup === step.process && b.side === step.side);
                    componentCount = bomEntries.reduce((sum, entry) => sum + Number(entry.count), 0);
                    
                    // CT = (Components / RatePH) * 3600 / OEE
                    // Avoid div by zero
                    if (rawRate > 0) {
                    cycleTime = (componentCount / rawRate) * 3600;
                    }
                } else {
                    // Fixed rate machine (e.g., Printer, Reflow)
                    // Rate is typically Boards (or Panels) per Hour
                    // CT = (1 / RatePH) * 3600 / OEE
                    // * Penalization logic: If boardsPerPanel > 1, and machine handles panels, effective rate for board is higher?
                    // Let's assume Rate is "Operations per Hour".
                    // If operation is "Print 1 Panel", and panel has 2 boards, we divide CT by 2 for per-board CT.
                    
                    // Simplifying assumption based on PPT: "Nominal rate" usually means throughput of the unit being processed.
                    if (rawRate > 0) {
                    cycleTime = (1 / rawRate) * 3600;
                    }
                }

                // Apply OEE
                const effectiveCycleTime = cycleTime / (oee || 1); // Avoid NaN
                
                // Apply Setup Loss (Amortized per board)
                const setupLossPerBoard = (basicInfo.setupTimeMin * 60) / basicInfo.lotSize;
                const finalCycleTime = effectiveCycleTime + setupLossPerBoard;

                return {
                    ...step,
                    machineDescription: machine.description,
                    cycleTime: finalCycleTime,
                    rawCycleTime: cycleTime,
                    taktTime: taktTime,
                    componentCount,
                    isBottleneck: false 
                };
                });

                // 3. Identify Bottleneck
                const maxCycleTime = Math.max(...stepResults.map(s => s.cycleTime));
                const finalSteps = stepResults.map(s => ({
                ...s,
                isBottleneck: s.cycleTime === maxCycleTime,
                utilization: (s.cycleTime / maxCycleTime) * 100
                }));

                // 4. Aggregate Metrics
                const bottleneckStep = finalSteps.find(s => s.isBottleneck);
                const uph = maxCycleTime > 0 ? 3600 / maxCycleTime : 0;
                
                // Line Balance Efficiency
                // LBE = Sum(Process Times) / (Longest Process Time * Number of Processes)
                const sumCycleTime = finalSteps.reduce((acc, curr) => acc + curr.cycleTime, 0);
                const lineBalanceEfficiency = (sumCycleTime / (maxCycleTime * finalSteps.length)) * 100;

                return {
                taktTime,
                steps: finalSteps,
                uph,
                bottleneck: bottleneckStep,
                lineBalanceEfficiency,
                weeklyOutput: uph * (availableMinutesPerDay / 60) * basicInfo.workDays * basicInfo.targetUtilization
                };
            }, [basicInfo, machines, bomMap, processSteps]);

            // --- MVA Calculations ---
            const mvaResults = useMemo(() => {
                const lineUphRaw = simulationResults?.uph || 0;

                const clamp01 = (n, fallback = 1) => {
                    const v = Number(n);
                    if (!Number.isFinite(v)) return fallback;
                    return Math.min(1, Math.max(0, v));
                };

                const l10Fpy = l10LaborTimeEstimation?.meta?.fpy;
                const fpyEffective = (mvaYield?.useL10Fpy && Number.isFinite(Number(l10Fpy)))
                    ? clamp01(l10Fpy, 1)
                    : clamp01(mvaYield?.fpy ?? basicInfo?.fpy, 1);
                const vpyEffective = clamp01(mvaYield?.vpy, 1);
                const yieldFactor = fpyEffective * vpyEffective;
                const strategy = String(mvaYield?.strategy || 'ignore');
                const lineUphUsedForCapacity = (strategy === 'apply_to_capacity') ? (Number(lineUphRaw) || 0) * yieldFactor : (Number(lineUphRaw) || 0);

                // Monthly volume: prefer RFQ input; fallback uses plan.
                const demandMode = mvaVolume?.demandMode || 'monthly';
                const rfqQtyPerMonth = mvaVolume?.rfqQtyPerMonth;
                const weeklyDemand = mvaVolume?.weeklyDemand;
                const workDaysPerWeek = mvaVolume?.workDaysPerWeek;
                const workDaysPerMonth = mvaVolume?.workDaysPerMonth;

                // Use basicInfo shifts/hours as the default plan calendar.
                const shiftsPerDay = basicInfo?.shiftsPerDay;
                const hoursPerShift = basicInfo?.hoursPerShift;
                const utilization = basicInfo?.targetUtilization ?? 1;

                // We must keep useMemo synchronous; use a small synchronous fallback until helpers are loaded.
                const rfqMonthly = Number(rfqQtyPerMonth) || 0;
                const weekly = Number(weeklyDemand) || 0;
                const wdW = Number(workDaysPerWeek) || 0;
                const wdM = Number(workDaysPerMonth) || 0;

                const convertedMonthly = (demandMode === 'weekly' && weekly > 0 && wdW > 0 && wdM > 0)
                    ? (weekly * (wdM / wdW))
                    : rfqMonthly;

                const inferredVolume = convertedMonthly > 0
                    ? convertedMonthly
                    : (Number(lineUphUsedForCapacity) || 0) * (Number(shiftsPerDay) || 0) * (Number(hoursPerShift) || 0) * (Number(workDaysPerMonth) || 0) * (Number(utilization) || 1);

                // Lightweight calculation inline; full helper is used by tests and by export (async).
                const eff = Number(mvaRates?.efficiency) || 0;
                const dlRate = Number(mvaRates?.directLaborHourlyRate) || 0;
                const idlRate = Number(mvaRates?.indirectLaborHourlyRate) || 0;

                const calcLaborRows = (rows, hourlyRate) => {
                    return (rows || []).map((r) => {
                        const uphBase = (r?.uphSource === 'override' && Number(r?.overrideUph) > 0) ? Number(r.overrideUph) : lineUphRaw;
                        const uphUsed = (strategy === 'apply_to_capacity') ? (uphBase * yieldFactor) : uphBase;
                        
                        const rawHc = Number(r?.headcount) || 0;
                        // Default to 100% if not specified
                        const alloc = (r?.allocationPercent !== undefined && r?.allocationPercent !== null) ? Number(r.allocationPercent) : 1;
                        const effHc = rawHc * alloc;

                        const perUnit = (uphUsed > 0 && eff > 0)
                            ? (hourlyRate * effHc) / (uphUsed * eff)
                            : 0;
                        return { ...r, uphUsed, costPerUnit: perUnit, effectiveHeadcount: effHc };
                    });
                };

                const dlBreakdown = calcLaborRows(directLaborRows, dlRate);
                const idlBreakdown = calcLaborRows(indirectLaborRows, idlRate);
                const dlPerUnit = dlBreakdown.reduce((s, r) => s + (Number(r.costPerUnit) || 0), 0);
                const idlPerUnit = idlBreakdown.reduce((s, r) => s + (Number(r.costPerUnit) || 0), 0);

                const dep = Number(activeMvaOverhead?.equipmentDepreciationPerMonth) || 0;
                const mr = Number(activeMvaOverhead?.equipmentMaintenanceRatio) || 0;
                const space = Number(activeMvaOverhead?.spaceMonthlyCost) || 0;
                const power = Number(activeMvaOverhead?.powerCostPerUnit) || 0;
                const vol = Number(inferredVolume) || 0;

                const isProvidedNumber = (v) => v !== null && v !== undefined && v !== '' && Number.isFinite(Number(v));

                // Equipment List total (if enabled)
                const normalizeEquipment = (it, source) => {
                    const qty = Number(it?.qty) || 0;
                    const unitPrice = Number(it?.unitPrice) || 0;
                    const years = Number(it?.depreciationYears) || 0;
                    const computedCost = (years > 0) ? ((qty * unitPrice) / (years * 12)) : 0;
                    const costPerMonth = isProvidedNumber(it?.costPerMonth) ? Number(it.costPerMonth) : computedCost;
                    return { ...it, source, computedCostPerMonth: Number.isFinite(computedCost) ? computedCost : 0, costPerMonthUsed: Number.isFinite(costPerMonth) ? costPerMonth : 0 };
                };

                const equipmentComputedBase = (equipmentList || []).map((it) => normalizeEquipment(it, 'base'));
                const equipmentComputedExtra = (extraEquipmentList || []).map((it) => normalizeEquipment(it, 'extra'));
                const equipmentTotalPerMonthBase = equipmentComputedBase.reduce((s, it) => s + (Number(it.costPerMonthUsed) || 0), 0);
                const equipmentTotalPerMonthExtra = equipmentComputedExtra.reduce((s, it) => s + (Number(it.costPerMonthUsed) || 0), 0);
                const equipmentTotalPerMonth = equipmentTotalPerMonthBase + (useExtraEquipmentInTotal ? equipmentTotalPerMonthExtra : 0);
                const equipmentComputed = [...equipmentComputedBase, ...equipmentComputedExtra];
                const effectiveDepPerMonth = (useEquipmentListTotal && equipmentTotalPerMonth > 0) ? equipmentTotalPerMonth : dep;

                // Space allocation total (if enabled)
                const rateDefault = Number(spaceRatePerSqft) || 0;
                const mult = Number(spaceAreaMultiplier) || 1;
                let effectiveSpacePerMonth = 0;
                let spaceComputed = [];
                let floorTotalSqft = 0;
                let buildingAreaSqft = 0;
                let buildingAreaOverrideSqft = 0;
                let spaceTotalPerMonth = 0;

                if (spaceConfig?.mode === 'matrix') {
                    const l = Number(spaceConfig.lineLengthFt) || 0;
                    const w = Number(spaceConfig.lineWidthFt) || 0;
                    const area = l * w;
                    const ratio = spaceConfig.spaceRatio !== undefined ? Number(spaceConfig.spaceRatio) : 1;
                    const totalArea = area * ratio;
                    const rate = Number(spaceRatePerSqft) || 0;

                    effectiveSpacePerMonth = totalArea * rate;
                    spaceTotalPerMonth = effectiveSpacePerMonth;

                    floorTotalSqft = area;
                    buildingAreaSqft = totalArea;

                    spaceComputed = [{
                        id: 'matrix-result',
                        process: 'Line Area (Matrix)',
                        department: 'Production',
                        areaSqft: totalArea,
                        ratePerSqft: rate,
                        monthlyCostUsed: effectiveSpacePerMonth,
                        note: `L ${l} * W ${w} * Ratio ${ratio} = ${totalArea.toFixed(1)} sq.ft`
                    }];
                } else {
                    const mult = Number(spaceAreaMultiplier) || 1;
                    floorTotalSqft = (spaceAllocation || []).reduce((s, it) => s + (Number(it?.areaSqft) || 0), 0);
                    buildingAreaOverrideSqft = Math.max(0, Number(spaceBuildingAreaOverrideSqft) || 0);
                    buildingAreaSqft = (buildingAreaOverrideSqft > 0)
                        ? buildingAreaOverrideSqft
                        : (floorTotalSqft > 0 ? (floorTotalSqft * mult) : 0);

                    spaceComputed = (spaceAllocation || []).map((it) => {
                        const area = Number(it?.areaSqft) || 0;
                        const rateUsed = isProvidedNumber(it?.ratePerSqft) ? Number(it.ratePerSqft) : rateDefault;
                        const manualCost = isProvidedNumber(it?.monthlyCost) ? Number(it.monthlyCost) : null;
                        if (Number.isFinite(manualCost) && manualCost > 0) {
                            return { ...it, computedMonthlyCost: 0, monthlyCostUsed: manualCost };
                        }

                        let computedCost = 0;
                        if (buildingAreaOverrideSqft > 0) {
                            const share = (floorTotalSqft > 0) ? (area / floorTotalSqft) : 0;
                            const rowBuildingArea = share * buildingAreaSqft;
                            computedCost = (rowBuildingArea > 0 && rateUsed > 0) ? (rowBuildingArea * rateUsed) : 0;
                        } else {
                            computedCost = (area > 0 && rateUsed > 0) ? ((area * mult) * rateUsed) : 0;
                        }

                        return { ...it, computedMonthlyCost: computedCost, monthlyCostUsed: computedCost };
                    });
                    spaceTotalPerMonth = spaceComputed.reduce((s, it) => s + (Number(it.monthlyCostUsed) || 0), 0);
                    effectiveSpacePerMonth = (useSpaceAllocationTotal && spaceTotalPerMonth > 0) ? spaceTotalPerMonth : space;
                }

                const equipmentDepPerUnit = vol > 0 ? effectiveDepPerMonth / vol : 0;
                const equipmentMaintPerUnit = vol > 0 ? (effectiveDepPerMonth * mr) / vol : 0;
                const spacePerUnit = vol > 0 ? effectiveSpacePerMonth / vol : 0;
                const powerPerUnit = power;
                const overheadPerUnit = equipmentDepPerUnit + equipmentMaintPerUnit + spacePerUnit + powerPerUnit;

                // Extra categories (B/C/E/F/G)
                const bomCostPerUnit = Math.max(0, Number(mvaMaterials?.bomCostPerUnit) || 0);
                const attritionRate = Math.min(1, Math.max(0, Number(mvaMaterials?.attritionRate) || 0));
                const materialAttritionPerUnit = bomCostPerUnit * attritionRate;
                const consumablesPerUnit = Math.max(0, Number(mvaMaterials?.consumablesCostPerUnit) || 0);

                const corporateBurdenPerMonth = Math.max(0, Number(mvaSga?.corporateBurdenPerMonth) || 0);
                const siteMaintenancePerMonth = Math.max(0, Number(mvaSga?.siteMaintenancePerMonth) || 0);
                const itSecurityPerMonth = Math.max(0, Number(mvaSga?.itSecurityPerMonth) || 0);
                const sgaTotalPerMonth = corporateBurdenPerMonth + siteMaintenancePerMonth + itSecurityPerMonth;
                const sgaPerUnit = vol > 0 ? (sgaTotalPerMonth / vol) : 0;

                const bcBomCostPerUnit = Math.max(0, Number(mvaProfit?.bcBomCostPerUnit) || 0);
                const profitRate = Math.min(1, Math.max(0, Number(mvaProfit?.profitRate) || 0));
                const profitPerUnit = bcBomCostPerUnit * profitRate;

                const inventoryValuePerUnit = Math.max(0, Number(mvaIcc?.inventoryValuePerUnit) || 0);
                const iccRate = Math.min(1, Math.max(0, Number(mvaIcc?.iccRate) || 0));
                const iccPerUnit = inventoryValuePerUnit * iccRate;

                const otherPerUnit = materialAttritionPerUnit + consumablesPerUnit + sgaPerUnit + profitPerUnit + iccPerUnit;

                const groupSumByField = (rows, field) => {
                    const list = Array.isArray(rows) ? rows : [];
                    const byKey = new Map();
                    for (const r of list) {
                        const key = String(r?.[field] ?? '').trim() || '(Unspecified)';
                        const v = Math.max(0, Number(r?.costPerUnit) || 0);
                        byKey.set(key, (byKey.get(key) || 0) + v);
                    }
                    return Array.from(byKey.entries())
                        .map(([key, total]) => ({ key, total }))
                        .sort((a, b) => (b.total - a.total));
                };

                const dlByProcess = groupSumByField(dlBreakdown, 'process');
                const idlByDepartment = groupSumByField(idlBreakdown, 'department');

                return {
                    lineUphRaw,
                    lineUphUsedForCapacity,
                    monthlyVolume: inferredVolume,
                    dlBreakdown,
                    idlBreakdown,
                    dlPerUnit,
                    idlPerUnit,
                    yield: {
                        strategy,
                        useL10Fpy: !!mvaYield?.useL10Fpy,
                        fpyFromL10: Number.isFinite(Number(l10Fpy)) ? Number(l10Fpy) : null,
                        fpyEffective,
                        vpyEffective,
                        yieldFactor,
                    },
                    grouped: {
                        dlByProcess,
                        idlByDepartment,
                    },
                    materials: {
                        bomCostPerUnit,
                        attritionRate,
                        materialAttritionPerUnit,
                        consumablesPerUnit,
                    },
                    overhead: {
                        equipmentDepPerUnit,
                        equipmentMaintPerUnit,
                        spacePerUnit,
                        powerPerUnit,
                        totalOverheadPerUnit: overheadPerUnit,
                        equipmentDepPerMonthUsed: effectiveDepPerMonth,
                        equipmentListTotalPerMonth: equipmentTotalPerMonth,
                        equipmentListBaseTotalPerMonth: equipmentTotalPerMonthBase,
                        equipmentListExtraTotalPerMonth: equipmentTotalPerMonthExtra,
                        useExtraEquipmentInTotal,
                        spaceMonthlyCostUsed: effectiveSpacePerMonth,
                        spaceAllocationTotalPerMonth: spaceTotalPerMonth,
                        spaceFloorTotalSqft: floorTotalSqft,
                        spaceBuildingAreaSqft: buildingAreaSqft,
                        spaceBuildingAreaOverrideSqft: buildingAreaOverrideSqft,
                    },
                    sga: {
                        corporateBurdenPerMonth,
                        siteMaintenancePerMonth,
                        itSecurityPerMonth,
                        totalSgaPerMonth: sgaTotalPerMonth,
                        totalSgaPerUnit: sgaPerUnit,
                    },
                    profit: {
                        bcBomCostPerUnit,
                        profitRate,
                        profitPerUnit,
                    },
                    icc: {
                        inventoryValuePerUnit,
                        iccRate,
                        iccPerUnit,
                    },
                    otherPerUnit,
                    totalPerUnit: dlPerUnit + idlPerUnit + overheadPerUnit + otherPerUnit,
                    warnings: {
                        missingUph: !(lineUphRaw > 0),
                        missingEfficiency: !(eff > 0),
                        missingMonthlyVolume: !(inferredVolume > 0),
                    },
                    equipmentList: equipmentComputed,
                    spaceAllocation: spaceComputed,
                };
            }, [simulationResults, basicInfo, mvaRates, mvaVolume, mvaProcessType, mvaOverheadByProcess, activeMvaOverhead, mvaMaterials, mvaSga, mvaProfit, mvaIcc, directLaborRows, indirectLaborRows, equipmentList, extraEquipmentList, useEquipmentListTotal, useExtraEquipmentInTotal, spaceAllocation, useSpaceAllocationTotal, spaceRatePerSqft, spaceAreaMultiplier, spaceBuildingAreaOverrideSqft, spaceConfig]);

            const l10SummaryTableRows = useMemo(() => {
                const dl = Array.isArray(mvaResults?.dlBreakdown) ? mvaResults.dlBreakdown : [];
                const dep = Number(mvaResults?.overhead?.equipmentDepPerUnit) || 0;
                const maint = Number(mvaResults?.overhead?.equipmentMaintPerUnit) || 0;
                const totalMachine = Math.max(0, dep + maint);
                const perStation = dl.length > 0 ? (totalMachine / dl.length) : 0;
                return dl.map((row, idx) => {
                    const stationName = String(row?.name ?? `Station ${idx + 1}`);
                    const laborCost = Math.max(0, Number(row?.costPerUnit) || 0);
                    const machineCost = perStation;
                    return {
                        stationName,
                        machineCost,
                        laborCost,
                        totalCost: machineCost + laborCost,
                    };
                });
            }, [mvaResults]);

            // --- Handlers ---

            const handleBasicInfoChange = (key, val) => {
                setBasicInfo(prev => ({ ...prev, [key]: val }));
            };

            const updateMachineRate = (id, newRate) => {
                setMachines(prev => prev.map(m => m.id === id ? { ...m, rate: Number(newRate) } : m));
            };

            const updateBomCount = (id, newCount) => {
                setBomMap(prev => prev.map(b => b.id === id ? { ...b, count: Number(newCount) } : b));
            };

            // --- Render Functions ---

            const renderBasicInfo = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                <SectionHeader 
                    title="Basic Information" 
                    description="Configure the fundamental parameters for the simulation model."
                />
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">
                    <h3 className="font-semibold text-slate-300 border-b border-slate-700 pb-2">Production Planning</h3>
                    <InputField label="Model Name" value={basicInfo.modelName} onChange={v => handleBasicInfoChange('modelName', v)} />
                    <InputField label="Work Days (Planning)" value={basicInfo.workDays} onChange={v => handleBasicInfoChange('workDays', Number(v))} type="number" suffix="days" />
                    <InputField label="Weekly Demand" value={basicInfo.demandWeekly} onChange={v => handleBasicInfoChange('demandWeekly', Number(v))} type="number" suffix="units" />
                    </div>

                    <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">
                    <h3 className="font-semibold text-slate-300 border-b border-slate-700 pb-2">Shift Configuration</h3>
                    <InputField label="Shifts per Day" value={basicInfo.shiftsPerDay} onChange={v => handleBasicInfoChange('shiftsPerDay', Number(v))} type="number" />
                    <InputField label="Hours per Shift" value={basicInfo.hoursPerShift} onChange={v => handleBasicInfoChange('hoursPerShift', Number(v))} type="number" suffix="hrs" />
                    <InputField label="Breaks per Shift" value={basicInfo.breaksPerShiftMin} onChange={v => handleBasicInfoChange('breaksPerShiftMin', Number(v))} type="number" suffix="min" />
                    </div>

                    <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">
                    <h3 className="font-semibold text-slate-300 border-b border-slate-700 pb-2">Efficiency & Quality</h3>
                    <InputField label="Target Utilization (0-1)" value={basicInfo.targetUtilization} onChange={v => handleBasicInfoChange('targetUtilization', Number(v))} type="number" />
                    <InputField label="First Pass Yield (FPY)" value={basicInfo.fpy} onChange={v => handleBasicInfoChange('fpy', Number(v))} type="number" />
                    <InputField label="OEE - Placement" value={basicInfo.oeePlacement} onChange={v => handleBasicInfoChange('oeePlacement', Number(v))} type="number" />
                    <InputField label="OEE - Others" value={basicInfo.oeeOthers} onChange={v => handleBasicInfoChange('oeeOthers', Number(v))} type="number" />
                    </div>

                    <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">
                    <h3 className="font-semibold text-slate-300 border-b border-slate-700 pb-2">Batch Settings</h3>
                    <InputField label="Lot Size" value={basicInfo.lotSize} onChange={v => handleBasicInfoChange('lotSize', Number(v))} type="number" suffix="boards" />
                    <InputField label="Setup Time / Lot" value={basicInfo.setupTimeMin} onChange={v => handleBasicInfoChange('setupTimeMin', Number(v))} type="number" suffix="min" />
                    <InputField label="Boards per Panel" value={basicInfo.boardsPerPanel} onChange={v => handleBasicInfoChange('boardsPerPanel', Number(v))} type="number" />
                    </div>
                </div>

                <div className="flex justify-end mt-4">
                    <button 
                    onClick={() => setActiveTab('rates')}
                    className="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition-colors"
                    >
                    <span>Next: Machine Rates</span>
                    <Icons.ChevronRight size={16} />

            function downloadTextFile({ filename, content, mimeType }) {
                // Test hook: allow puppeteer e2e to capture downloads deterministically.
                if (window.__captureDownloads) {
                    if (!Array.isArray(window.__downloads)) window.__downloads = [];
                    window.__downloads.push({ filename, content, mimeType });
                    return;
                }
                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            }

            function arrayBufferToBase64(buf) {
                const bytes = new Uint8Array(buf);
                const chunkSize = 0x8000;
                let binary = '';
                for (let i = 0; i < bytes.length; i += chunkSize) {
                    const chunk = bytes.subarray(i, i + chunkSize);
                    binary += String.fromCharCode.apply(null, chunk);
                }
                return btoa(binary);
            }

            function downloadBinaryFile({ filename, arrayBuffer, mimeType }) {
                if (!arrayBuffer) return;
                // Test hook: allow puppeteer e2e to capture downloads deterministically.
                if (window.__captureDownloads) {
                    if (!Array.isArray(window.__downloads)) window.__downloads = [];
                    const b64 = arrayBufferToBase64(arrayBuffer);
                    window.__downloads.push({ filename, content: b64, mimeType, encoding: 'base64' });
                    return;
                }
                const blob = new Blob([arrayBuffer], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            }

                            const tplBuf = await fetch(encodeURI(templateXlsxUrl)).then(r => r.arrayBuffer());

                            const summarySheet = sheets.find(s => String(s.name()).trim() === 'L10 Summary_自動帶入_勿動') || wb.sheet(' L10 Summary_自動帶入_勿動');

                            const maxCols = filledGrid.reduce((m, r) => Math.max(m, Array.isArray(r) ? r.length : 0), 0);
                            for (let r = 0; r < filledGrid.length; r += 1) {
                                const row = filledGrid[r] || [];
                                for (let c = 0; c < maxCols; c += 1) {
                                    const v = (row[c] ?? '');
                                    const t = (templateGrid?.[r]?.[c] ?? '');
                                    if (String(v ?? '') === String(t ?? '')) continue;
                                    if (v === '' || v === null || v === undefined) continue;

                                    let cellValue = v;
                                    if (typeof v === 'string') {
                                        const s = v.trim();
                                        if (s !== '' && /^-?\d+(?:\.\d+)?(?:e[+\-]?\d+)?$/i.test(s)) {
                                            const n = Number(s);
                                            if (Number.isFinite(n)) cellValue = n;
                                        }
                                    }
                                    summarySheet.cell(r + 1, c + 1).value(cellValue);
                                }
                            }

                            const out = await wb.outputAsync({ type: 'arraybuffer' }).catch(() => wb.outputAsync());
                            let outBuf = out;
                            if (out instanceof Blob) outBuf = await out.arrayBuffer();
                            if (ArrayBuffer.isView(outBuf) && outBuf?.buffer) outBuf = outBuf.buffer;
                            if (typeof outBuf === 'string') {

                                const bin = atob(outBuf);
                                const bytes = new Uint8Array(bin.length);

                                outBuf = bytes.buffer;

                                            <th className="p-2 font-semibold border-b border-slate-700 text-right w-24 bg-slate-800/50">Mo Capa</th>
                                            
                                            {/* Extra Inputs demanded by User/Parity */}

                                            <th className="p-2 font-semibold border-b border-slate-700 text-right w-24 text-[10px]">Time(min)/cyc</th>
                                            <th className="p-2 font-semibold border-b border-slate-700 text-right w-24 text-[10px]">Run/Day</th>

                                            <th className="p-2 font-semibold border-b border-slate-700 w-20"></th>

                                    </thead>
                                    <tbody className="divide-y divide-slate-700">
                                        {stations.map((st, idx) => (
                                            <tr key={st?.id || idx} className="hover:bg-slate-700">
                                                <td className="p-1 sticky left-0 bg-slate-800 z-10">
                                                    <input
                                                        value={st?.name || ''}

                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-laborhc-${idx}`}
                                                    />
                                                </td>
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={Number(st?.parallelStations) || 1}
                                                        onChange={(e) => updateStation(idx, { parallelStations: Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-parallel-${idx}`}
                                                    />
                                                </td>
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={st?.cycleTimeSec ?? ''}
                                                        onChange={(e) => updateStation(idx, { cycleTimeSec: e.target.value === '' ? null : Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-ct-${idx}`}
                                                    />
                                                </td>
                                                <td className="p-1">
                                                    <input
                                                        type="number"
                                                        value={Number(st?.allowanceFactor) || 1}
                                                        onChange={(e) => updateStation(idx, { allowanceFactor: Number(e.target.value) })}
                                                        className="w-full p-1 bg-slate-800 border border-slate-700 rounded text-slate-100 text-right text-xs"
                                                        data-testid={`mva-l10-lte-allowance-${idx}`}
                                                    />
                                                </td>
                                                
                                                {/* Calculated Fields */}
                                                <td className="p-1 text-right font-mono text-slate-300 text-xs bg-slate-800/30">
