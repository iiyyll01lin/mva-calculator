        // --- MVA helpers (loaded via dynamic import to keep this HTML portable) ---
        // In Babel-in-browser, we can't use top-level import statements.
        // We'll lazy-load ESM helpers and fall back to local calculations if load fails.
        let __mva = null;
        async function loadMvaHelpers() {
            if (__mva) return __mva;
            try {
                if (window.__MVA_MODULES?.mvaCalc) {
                    __mva = window.__MVA_MODULES.mvaCalc;
                    return __mva;
                }
                __mva = await import('./mva/mvaCalc.js');
                return __mva;
            } catch (e) {
                console.warn('Failed to load mva helpers, using fallback.', e);
                __mva = {
                    laborCostPerUnit: ({ hourlyRate, headcount, lineUph, efficiency }) => {
                        const rate = Number(hourlyRate) || 0;
                        const hc = Number(headcount) || 0;
                        const uph = Number(lineUph) || 0;
                        const eff = Number(efficiency) || 0;
                        if (rate < 0 || hc < 0 || uph <= 0 || eff <= 0) return 0;
                        return (rate * hc) / (uph * eff);
                    },
                    monthlyVolumeFromPlan: ({ rfqQtyPerMonth, lineUph, shiftsPerDay, hoursPerShift, workDaysPerMonth, utilization = 1 }) => {
                        const rfq = Number(rfqQtyPerMonth) || 0;
                        if (rfq > 0) return rfq;
                        const uph = Number(lineUph) || 0;
                        const shifts = Number(shiftsPerDay) || 0;
                        const hours = Number(hoursPerShift) || 0;
                        const days = Number(workDaysPerMonth) || 0;
                        const util = Number(utilization) || 1;
                        return uph * shifts * hours * days * util;
                    },
                    overheadPerUnit: ({ equipmentDepreciationPerMonth, equipmentMaintenanceRatio, spaceMonthlyCost, powerCostPerUnit, monthlyVolume }) => {
                        const dep = Number(equipmentDepreciationPerMonth) || 0;
                        const mr = Number(equipmentMaintenanceRatio) || 0;
                        const space = Number(spaceMonthlyCost) || 0;
                        const power = Number(powerCostPerUnit) || 0;
                        const vol = Number(monthlyVolume) || 0;
                        if (vol <= 0) {
                            return {
                                equipmentDepPerUnit: 0,
                                equipmentMaintPerUnit: 0,
                                spacePerUnit: 0,
                                powerPerUnit: power,
                                totalOverheadPerUnit: power,
                            };
                        }
                        const equipmentDepPerUnit = dep / vol;
                        const equipmentMaintPerUnit = (dep * mr) / vol;
                        const spacePerUnit = space / vol;
                        const powerPerUnit = power;
                        return {
                            equipmentDepPerUnit,
                            equipmentMaintPerUnit,
                            spacePerUnit,
                            powerPerUnit,
                            totalOverheadPerUnit: equipmentDepPerUnit + equipmentMaintPerUnit + spacePerUnit + powerPerUnit,
                        };
                    },
                    computeMvaMvp: ({ directLaborRows, indirectLaborRows, rates, overhead, lineUph, monthlyVolume }) => {
                        const dlRate = rates?.directLaborHourlyRate ?? 0;
                        const idlRate = rates?.indirectLaborHourlyRate ?? 0;
                        const eff = rates?.efficiency ?? 0;
                        const dlBreakdown = (directLaborRows || []).map((row) => {
                            const uph = row?.uphSource === 'override' ? row?.overrideUph : lineUph;
                            return {
                                id: row?.id,
                                name: row?.name,
                                headcount: row?.headcount,
                                uphUsed: uph,
                                costPerUnit: __mva.laborCostPerUnit({ hourlyRate: dlRate, headcount: row?.headcount, lineUph: uph, efficiency: eff })
                            };
                        });
                        const idlBreakdown = (indirectLaborRows || []).map((row) => {
                            const uph = row?.uphSource === 'override' ? row?.overrideUph : lineUph;
                            return {
                                id: row?.id,
                                name: row?.name,
                                headcount: row?.headcount,
                                uphUsed: uph,
                                costPerUnit: __mva.laborCostPerUnit({ hourlyRate: idlRate, headcount: row?.headcount, lineUph: uph, efficiency: eff })
                            };
                        });
                        const dlPerUnit = dlBreakdown.reduce((sum, r) => sum + (Number(r.costPerUnit) || 0), 0);
                        const idlPerUnit = idlBreakdown.reduce((sum, r) => sum + (Number(r.costPerUnit) || 0), 0);
                        const overheadComputed = __mva.overheadPerUnit({
                            equipmentDepreciationPerMonth: overhead?.equipmentDepreciationPerMonth,
                            equipmentMaintenanceRatio: overhead?.equipmentMaintenanceRatio,
                            spaceMonthlyCost: overhead?.spaceMonthlyCost,
                            powerCostPerUnit: overhead?.powerCostPerUnit,
                            monthlyVolume,
                        });
                        const totalPerUnit = dlPerUnit + idlPerUnit + (Number(overheadComputed.totalOverheadPerUnit) || 0);
                        return { dlBreakdown, idlBreakdown, dlPerUnit, idlPerUnit, overhead: overheadComputed, totalPerUnit };
                    },
                };
                return __mva;
            }
        }

        // --- Main Application Component ---

        function L6Simulation() {
            const [activeTab, setActiveTab] = useState('basic');
            const [basicInfo, setBasicInfo] = useState(DEFAULT_BASIC_INFO);
            const [machines, setMachines] = useState(DEFAULT_MACHINES);
            const [bomMap, setBomMap] = useState(DEFAULT_BOM_MAP);
            const [processSteps, setProcessSteps] = useState(DEFAULT_PROCESS);

            // --- MVA State (MVP) ---
            const [mvaRates, setMvaRates] = useState({
                directLaborHourlyRate: 12.5,
                indirectLaborHourlyRate: 23.28,
                efficiency: 0.93,
            });

            const [mvaVolume, setMvaVolume] = useState({
                demandMode: 'monthly', // 'monthly' | 'weekly'
                rfqQtyPerMonth: 10000,
                weeklyDemand: 0,
                workDaysPerWeek: 5,
                workDaysPerMonth: 22,
            });

            const [mvaOverhead, setMvaOverhead] = useState({
                equipmentDepreciationPerMonth: 11271.150918914824,
                equipmentMaintenanceRatio: 0.1,
                spaceMonthlyCost: 229742.99,
                powerCostPerUnit: 0.28,
            });

            const [directLaborRows, setDirectLaborRows] = useState([
                { id: 'dl-offline', name: 'offline', headcount: 17, uphSource: 'line' },
                { id: 'dl-assembly', name: 'Assembly', headcount: 15, uphSource: 'line' },
                { id: 'dl-kitting', name: 'Kitting', headcount: 3, uphSource: 'line' },
                { id: 'dl-test', name: 'Test', headcount: 4, uphSource: 'line' },
                { id: 'dl-packing', name: 'Packing', headcount: 10, uphSource: 'line' },
                { id: 'dl-shipping', name: 'Shipping', headcount: 1, uphSource: 'line' },
            ]);

            const [indirectLaborRows, setIndirectLaborRows] = useState([
                { id: 'idl-site-mgr', name: 'Site Mgr.', headcount: 0.22, uphSource: 'line' },
                { id: 'idl-fis-mes', name: 'FIS/MES', headcount: 1.76, uphSource: 'line' },
                { id: 'idl-ie-om', name: 'IE/OM/Facility', headcount: 2.376, uphSource: 'line' },
                { id: 'idl-te', name: 'TE', headcount: 8.36, uphSource: 'line' },
                { id: 'idl-qai', name: 'QAI', headcount: 0.7128, uphSource: 'line' },
                { id: 'idl-sqe', name: 'SQE', headcount: 3.8016, uphSource: 'line' },
                { id: 'idl-hr', name: 'HR', headcount: 5.5836, uphSource: 'line' },
            ]);

            // --- Calculations ---

            const simulationResults = useMemo(() => {
                // 1. Calculate Available Time & Demand
                const availableMinutesPerDay = (basicInfo.shiftsPerDay * basicInfo.hoursPerShift * 60) - (basicInfo.shiftsPerDay * basicInfo.breaksPerShiftMin);
                const availableSecondsPerWeek = availableMinutesPerDay * 60 * basicInfo.workDays;
                const taktTime = availableSecondsPerWeek / basicInfo.demandWeekly; // Seconds per board needed to meet demand

                // 2. Calculate Cycle Time per Step
                const stepResults = processSteps.map(step => {
                const machine = machines.find(m => m.group === step.process);
                if (!machine) return { ...step, cycleTime: 0, machineType: 'unknown', rate: 0 };

                let cycleTime = 0;
                let rawRate = machine.rate; // Units per hour
                let componentCount = 0;
                let oee = machine.type === 'placement' ? basicInfo.oeePlacement : basicInfo.oeeOthers;

                if (machine.type === 'placement') {
                    // Find BOM entries for this machine group and side
                    const bomEntries = bomMap.filter(b => b.machineGroup === step.process && b.side === step.side);
                    componentCount = bomEntries.reduce((sum, entry) => sum + Number(entry.count), 0);
                    
                    // CT = (Components / RatePH) * 3600 / OEE
                    // Avoid div by zero
                    if (rawRate > 0) {
                    cycleTime = (componentCount / rawRate) * 3600;
                    }
                } else {
                    // Fixed rate machine (e.g., Printer, Reflow)
                    // Rate is typically Boards (or Panels) per Hour
                    // CT = (1 / RatePH) * 3600 / OEE
                    // * Penalization logic: If boardsPerPanel > 1, and machine handles panels, effective rate for board is higher?
                    // Let's assume Rate is "Operations per Hour".
                    // If operation is "Print 1 Panel", and panel has 2 boards, we divide CT by 2 for per-board CT.
                    
                    // Simplifying assumption based on PPT: "Nominal rate" usually means throughput of the unit being processed.
                    if (rawRate > 0) {
                    cycleTime = (1 / rawRate) * 3600;
                    }
                }

                // Apply OEE
                const effectiveCycleTime = cycleTime / (oee || 1); // Avoid NaN
                
                // Apply Setup Loss (Amortized per board)
                const setupLossPerBoard = (basicInfo.setupTimeMin * 60) / basicInfo.lotSize;
                const finalCycleTime = effectiveCycleTime + setupLossPerBoard;

                return {
                    ...step,
                    machineDescription: machine.description,
                    cycleTime: finalCycleTime,
                    rawCycleTime: cycleTime,
                    taktTime: taktTime,
                    componentCount,
                    isBottleneck: false 
                };
                });

                // 3. Identify Bottleneck
                const maxCycleTime = Math.max(...stepResults.map(s => s.cycleTime));
                const finalSteps = stepResults.map(s => ({
                ...s,
                isBottleneck: s.cycleTime === maxCycleTime,
                utilization: (s.cycleTime / maxCycleTime) * 100
                }));

                // 4. Aggregate Metrics
                const bottleneckStep = finalSteps.find(s => s.isBottleneck);
                const uph = maxCycleTime > 0 ? 3600 / maxCycleTime : 0;
                
                // Line Balance Efficiency
                // LBE = Sum(Process Times) / (Longest Process Time * Number of Processes)
                const sumCycleTime = finalSteps.reduce((acc, curr) => acc + curr.cycleTime, 0);
                const lineBalanceEfficiency = (sumCycleTime / (maxCycleTime * finalSteps.length)) * 100;

                return {
                taktTime,
                steps: finalSteps,
                uph,
                bottleneck: bottleneckStep,
                lineBalanceEfficiency,
                weeklyOutput: uph * (availableMinutesPerDay / 60) * basicInfo.workDays * basicInfo.targetUtilization
                };
            }, [basicInfo, machines, bomMap, processSteps]);

            // --- MVA Calculations ---
            const mvaResults = useMemo(() => {
                const lineUph = simulationResults?.uph || 0;

                // Monthly volume: prefer RFQ input; fallback uses plan.
                const demandMode = mvaVolume?.demandMode || 'monthly';
                const rfqQtyPerMonth = mvaVolume?.rfqQtyPerMonth;
                const weeklyDemand = mvaVolume?.weeklyDemand;
                const workDaysPerWeek = mvaVolume?.workDaysPerWeek;
                const workDaysPerMonth = mvaVolume?.workDaysPerMonth;

                // Use basicInfo shifts/hours as the default plan calendar.
                const shiftsPerDay = basicInfo?.shiftsPerDay;
                const hoursPerShift = basicInfo?.hoursPerShift;
                const utilization = basicInfo?.targetUtilization ?? 1;

                // We must keep useMemo synchronous; use a small synchronous fallback until helpers are loaded.
                const rfqMonthly = Number(rfqQtyPerMonth) || 0;
                const weekly = Number(weeklyDemand) || 0;
                const wdW = Number(workDaysPerWeek) || 0;
                const wdM = Number(workDaysPerMonth) || 0;

                const convertedMonthly = (demandMode === 'weekly' && weekly > 0 && wdW > 0 && wdM > 0)
                    ? (weekly * (wdM / wdW))
                    : rfqMonthly;

                const inferredVolume = convertedMonthly > 0
                    ? convertedMonthly
                    : (Number(lineUph) || 0) * (Number(shiftsPerDay) || 0) * (Number(hoursPerShift) || 0) * (Number(workDaysPerMonth) || 0) * (Number(utilization) || 1);

                // Lightweight calculation inline; full helper is used by tests and by export (async).
                const eff = Number(mvaRates?.efficiency) || 0;
                const dlRate = Number(mvaRates?.directLaborHourlyRate) || 0;
                const idlRate = Number(mvaRates?.indirectLaborHourlyRate) || 0;

                const calcLaborRows = (rows, hourlyRate) => {
                    return (rows || []).map((r) => {
                        const uphUsed = (r?.uphSource === 'override' && Number(r?.overrideUph) > 0) ? Number(r.overrideUph) : lineUph;
                        const hc = Number(r?.headcount) || 0;
                        const perUnit = (uphUsed > 0 && eff > 0)
                            ? (hourlyRate * hc) / (uphUsed * eff)
                            : 0;
                        return { ...r, uphUsed, costPerUnit: perUnit };
                    });
                };

                const dlBreakdown = calcLaborRows(directLaborRows, dlRate);
                const idlBreakdown = calcLaborRows(indirectLaborRows, idlRate);
                const dlPerUnit = dlBreakdown.reduce((s, r) => s + (Number(r.costPerUnit) || 0), 0);
                const idlPerUnit = idlBreakdown.reduce((s, r) => s + (Number(r.costPerUnit) || 0), 0);

                const dep = Number(mvaOverhead?.equipmentDepreciationPerMonth) || 0;
                const mr = Number(mvaOverhead?.equipmentMaintenanceRatio) || 0;
                const space = Number(mvaOverhead?.spaceMonthlyCost) || 0;
                const power = Number(mvaOverhead?.powerCostPerUnit) || 0;
                const vol = Number(inferredVolume) || 0;

                const equipmentDepPerUnit = vol > 0 ? dep / vol : 0;
                const equipmentMaintPerUnit = vol > 0 ? (dep * mr) / vol : 0;
                const spacePerUnit = vol > 0 ? space / vol : 0;
                const powerPerUnit = power;
                const overheadPerUnit = equipmentDepPerUnit + equipmentMaintPerUnit + spacePerUnit + powerPerUnit;

                return {
                    lineUph,
                    monthlyVolume: inferredVolume,
                    dlBreakdown,
                    idlBreakdown,
                    dlPerUnit,
                    idlPerUnit,
                    overhead: {
                        equipmentDepPerUnit,
                        equipmentMaintPerUnit,
                        spacePerUnit,
                        powerPerUnit,
                        totalOverheadPerUnit: overheadPerUnit,
                    },
                    totalPerUnit: dlPerUnit + idlPerUnit + overheadPerUnit,
                    warnings: {
                        missingUph: !(lineUph > 0),
                        missingEfficiency: !(eff > 0),
                        missingMonthlyVolume: !(inferredVolume > 0),
                    },
                };

                if (window.__captureDownloads) {
                    if (!Array.isArray(window.__downloads)) window.__downloads = [];
                    window.__downloads.push({ filename, content, mimeType });
                    return;
                }
                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            }

            function formatTimestamp() {
                const d = new Date();
                const pad = (n) => String(n).padStart(2, '0');
                return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            }

            const exportMvaReport = async () => {
                const ts = formatTimestamp();
                const safeModel = (basicInfo?.modelName || 'model').replace(/[^\w\-\.]+/g, '_');
                const jsonName = `mva_${safeModel}_${ts}.json`;
                const csvName = `mva_${safeModel}_${ts}.csv`;

                const helpers = await loadMvaHelpers();

                const lineUph = simulationResults?.uph || 0;
                const convertedMonthly = (mvaVolume?.demandMode === 'weekly' && Number(mvaVolume?.weeklyDemand) > 0)
                    ? (Number(mvaVolume.weeklyDemand) * (Number(mvaVolume?.workDaysPerMonth || 0) / Math.max(1, Number(mvaVolume?.workDaysPerWeek || 0))))
                    : 0;

                const monthlyVolume = convertedMonthly || helpers.monthlyVolumeFromPlan({
                    rfqQtyPerMonth: mvaVolume?.rfqQtyPerMonth,
                    lineUph,
                    shiftsPerDay: basicInfo?.shiftsPerDay,
                    hoursPerShift: basicInfo?.hoursPerShift,
                    workDaysPerMonth: mvaVolume?.workDaysPerMonth,
                    utilization: basicInfo?.targetUtilization ?? 1,
                });

                const computed = helpers.computeMvaMvp({
                    directLaborRows,
                    indirectLaborRows,
                    rates: mvaRates,
                    overhead: mvaOverhead,
                    lineUph,
                    monthlyVolume,
                });

                const payload = {
                    meta: {
                        generatedAt: new Date().toISOString(),
                        version: 'mva-demo-mvp',
                    },
                    basicInfo,
                    machines,
                    bomMap,
                    processSteps,
                    simulationResults,
                    mvaInputs: {
                        rates: mvaRates,
                        volume: mvaVolume,
                        overhead: mvaOverhead,
                        directLaborRows,
                        indirectLaborRows,
                    },
                    mvaComputed: {
                        lineUph,
                        monthlyVolume,
                        ...computed,
                    }
                };

                downloadTextFile({ filename: jsonName, content: JSON.stringify(payload, null, 2), mimeType: 'application/json' });

                const csvRows = [
                    ['Section', 'Item', 'Value'],
                    ['MVA', 'DL_per_unit', computed.dlPerUnit],
                    ['MVA', 'IDL_per_unit', computed.idlPerUnit],
                    ['MVA', 'Overhead_per_unit', computed.overhead.totalOverheadPerUnit],
                    ['MVA', 'Total_per_unit', computed.totalPerUnit],
                    ['MVA', 'Line_UPH', lineUph],
                    ['MVA', 'Monthly_Volume', monthlyVolume],
                    ['Inputs', 'DL_rate', mvaRates.directLaborHourlyRate],
                    ['Inputs', 'IDL_rate', mvaRates.indirectLaborHourlyRate],
                    ['Inputs', 'Efficiency', mvaRates.efficiency],
                ];

                const csvMod = await loadCsvHelpers();
                const csvText = csvMod?.toCsv ? csvMod.toCsv(csvRows) : csvRows.map(r => r.join(',')).join('\n');
                downloadTextFile({ filename: csvName, content: csvText, mimeType: 'text/csv' });
            };

            const renderMvaSetup = () => (

                        <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">

                            <InputField label="Direct Labor - Hourly Rate" value={mvaRates.directLaborHourlyRate} onChange={v => setMvaRates(prev => ({ ...prev, directLaborHourlyRate: Number(v) }))} type="number" inputProps={{ 'data-testid': 'mva-dl-rate' }} />
                            <InputField label="Indirect Labor - Hourly Rate" value={mvaRates.indirectLaborHourlyRate} onChange={v => setMvaRates(prev => ({ ...prev, indirectLaborHourlyRate: Number(v) }))} type="number" inputProps={{ 'data-testid': 'mva-idl-rate' }} />
                            <InputField label="Efficiency (0-1)" value={mvaRates.efficiency} onChange={v => setMvaRates(prev => ({ ...prev, efficiency: Number(v) }))} type="number" inputProps={{ 'data-testid': 'mva-efficiency' }} />

                            <div className="pt-3 border-t border-slate-700">
                                <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Import (Month/Year Update CSV)</div>

                                    accept=".csv,text/csv"
                                    onChange={(e) => importMonthYearUpdateCsv(e.target.files?.[0])}
                                    data-testid="mva-import-month-year"
                                    className="block w-full text-sm text-slate-300 file:mr-3 file:py-2 file:px-3 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-slate-700 file:text-slate-100 hover:file:bg-slate-600"

                                <div className="text-xs text-slate-500 mt-1">Supports: Direct Labor Hourly Rate, IDirect Labor Hourly Rate, Efficiency.</div>
                            </div>
                        </div>

                            </div>

                            {mvaVolume.demandMode === 'monthly' ? (
                                <InputField label="RFQ Qty / Month" value={mvaVolume.rfqQtyPerMonth} onChange={v => setMvaVolume(prev => ({ ...prev, rfqQtyPerMonth: Number(v) }))} type="number" suffix="units" inputProps={{ 'data-testid': 'mva-rfq-month' }} />

                                <>
                                    <InputField label="Weekly Demand" value={mvaVolume.weeklyDemand} onChange={v => setMvaVolume(prev => ({ ...prev, weeklyDemand: Number(v) }))} type="number" suffix="units" inputProps={{ 'data-testid': 'mva-weekly-demand' }} />
                                    <InputField label="Work Days / Week" value={mvaVolume.workDaysPerWeek} onChange={v => setMvaVolume(prev => ({ ...prev, workDaysPerWeek: Number(v) }))} type="number" suffix="days" inputProps={{ 'data-testid': 'mva-workdays-week' }} />

                    </div>

                    <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm space-y-4">

                    </div>

                    <div className="flex justify-end mt-4">
                        <button

            );

                                    </td>
                                    <td className="p-3">
                                        <select

                                            onChange={(e) => updateLaborRow(kind, r.id, { uphSource: e.target.value })}
                                            className="p-1.5 bg-slate-700 border border-slate-600 rounded text-slate-100"

                                        </select>

                                        <input
                                            type="number"
                                            value={r.overrideUph ?? ''}
                                            onChange={(e) => updateLaborRow(kind, r.id, { overrideUph: Number(e.target.value) })}
                                            className="w-28 p-1.5 bg-slate-700 border border-slate-600 rounded text-right text-slate-100"
                                            disabled={r.uphSource !== 'override'}
                                        />
                                    </td>
                                    <td className="p-3 text-right font-mono text-slate-200">{(Number(r.costPerUnit) || 0).toFixed(2)}</td>
                                    <td className="p-3 text-right">
                                        <button
                                            onClick={() => deleteLaborRow(kind, r.id)}
                                            className="text-xs bg-red-900/40 hover:bg-red-900/60 text-red-200 px-2 py-1 rounded"
                                        >
                                            Delete
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            const renderMvaLabor = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <SectionHeader
                        title="MVA Labor"
                        description="Define direct and indirect labor rows used to compute labor cost per unit."
                    />

                    <LaborTable title="Direct Labor" rows={mvaResults.dlBreakdown} kind="dl" />
                    <LaborTable title="Indirect Labor" rows={mvaResults.idlBreakdown} kind="idl" />

                    <div className="flex justify-end">
                        <button
                            onClick={() => setActiveTab('mva_summary')}
                            className="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition-colors"
                        >
                            <span>Next: MVA Summary</span>
                            <Icons.ChevronRight size={16} />
                        </button>
                    </div>
                </div>
            );

            const renderMvaSummary = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-100">MVA Summary (MVP)</h2>
                            <p className="text-slate-400">Model: <span className="font-semibold text-blue-400">{basicInfo.modelName}</span></p>
                        </div>
                        <button
                            onClick={exportMvaReport}
                            className="flex items-center space-x-2 text-blue-200 bg-blue-600/40 px-4 py-2 rounded-md hover:bg-blue-600/60 transition-colors"
                            data-testid="mva-export"
                        >
                            <Icons.Save size={18} />
                            <span>Export MVA</span>
                        </button>
                    </div>

                    {(mvaResults.warnings.missingUph || mvaResults.warnings.missingEfficiency || mvaResults.warnings.missingMonthlyVolume) && (
                        <div className="bg-orange-900/20 border border-orange-800 p-4 rounded-md">
                            <div className="flex items-start space-x-3">
                                <Icons.AlertCircle className="text-orange-500 shrink-0 mt-0.5" />
                                <div className="text-sm text-orange-200">
                                    <div className="font-bold">Input warning</div>
                                    <ul className="mt-1 text-orange-300 list-disc pl-5 space-y-1">
                                        {mvaResults.warnings.missingUph && <li>Line UPH is 0 (run simulation or adjust inputs).</li>}
                                        {mvaResults.warnings.missingEfficiency && <li>Efficiency is 0 (set in MVA Setup).</li>}
                                        {mvaResults.warnings.missingMonthlyVolume && <li>Monthly volume is 0 (set RFQ Qty/Month or calendar).</li>}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm">
                            <p className="text-xs font-bold text-slate-400 uppercase">DL / Unit</p>
                            <p className="text-3xl font-bold text-slate-100 mt-1">{mvaResults.dlPerUnit.toFixed(2)}</p>
                        </div>
                        <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm">
                            <p className="text-xs font-bold text-slate-400 uppercase">IDL / Unit</p>
                            <p className="text-3xl font-bold text-slate-100 mt-1">{mvaResults.idlPerUnit.toFixed(2)}</p>
                        </div>
                        <div className="bg-slate-800 p-5 rounded-lg border border-slate-700 shadow-sm">
                            <p className="text-xs font-bold text-slate-400 uppercase">Overhead / Unit</p>
                            <p className="text-3xl font-bold text-slate-100 mt-1">{mvaResults.overhead.totalOverheadPerUnit.toFixed(2)}</p>
                        </div>
                        <div className="bg-blue-900/20 p-5 rounded-lg border border-blue-800 shadow-sm">
                            <p className="text-xs font-bold text-blue-300 uppercase">Total / Unit</p>
                            <p className="text-3xl font-bold text-blue-100 mt-1">{mvaResults.totalPerUnit.toFixed(2)}</p>
                        </div>
                    </div>

                    <div className="bg-slate-800 border border-slate-700 rounded-lg p-5">
                        <h3 className="font-semibold text-slate-200 mb-3">Traceability</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm text-slate-300">
                            <div className="bg-slate-900/40 border border-slate-700 rounded p-3">
                                <div className="text-slate-400 text-xs uppercase font-bold">UPH / Volume</div>
                                <div className="mt-2 font-mono">
                                    Line UPH: {mvaResults.lineUph.toFixed(2)}
                                    <br />
                                    Monthly Volume: {Number(mvaResults.monthlyVolume).toFixed(0)}
                                </div>
                            </div>

                                    DL rate: {Number(mvaRates.directLaborHourlyRate).toFixed(2)}
                                    <br />
                                    IDL rate: {Number(mvaRates.indirectLaborHourlyRate).toFixed(2)}
                                    <br />
                                    Efficiency: {Number(mvaRates.efficiency).toFixed(2)}
                                </div>
                            </div>
                            <div className="bg-slate-900/40 border border-slate-700 rounded p-3">
                                <div className="text-slate-400 text-xs uppercase font-bold">Formula</div>
                                <div className="mt-2 font-mono text-xs">
                                    Cost/Unit = HourlyRate × HC / (UPH × Efficiency)
                                    <br />
                                    EquipDep/Unit = Dep/Month / MonthlyVolume
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full bg-slate-900 text-slate-100 font-sans">
                {/* Sidebar */}
                <div className="w-64 bg-slate-800 border-r border-slate-700 flex flex-col shadow-lg z-10">
                    <div className="p-6 border-b border-slate-700">
                    <h1 className="text-xl font-extrabold text-blue-500 tracking-tight">Inventec L6 Simu</h1>
                    <p className="text-xs text-slate-400 mt-1">Line Balance System</p>
                    </div>
                    
                    <nav className="flex-1 py-4 space-y-1">
                    <SidebarItem 
                        icon={Icons.Settings} 
                        label="Basic Info" 
                        active={activeTab === 'basic'}

                    <SidebarItem

                        label="Machine Rates"

                    {activeTab === 'simulation' && renderSimulation()}

                    {activeTab === 'mva_labor' && renderMvaLabor()}

        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<L6Simulation />);
    </script>
</body>
