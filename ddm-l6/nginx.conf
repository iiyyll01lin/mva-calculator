server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index l6-ddm-demo.html;

  # ── API reverse proxy → FastAPI backend ────────────────────────────────────
  # Use Docker's embedded DNS resolver (127.0.0.11) so the upstream hostname
  # is resolved per-request rather than at config load time.  This prevents
  # Nginx from refusing to start if ddm-backend is momentarily unreachable,
  # and also means Nginx picks up a restarted backend container automatically.
  # valid=10s: re-query DNS every 10 s to track container IP changes.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── SSE stream endpoint — disable buffering for real-time delivery ─────────
  location /api/v1/agent/stream/ {
    set $ddm_backend "http://ddm-backend:8000";
    proxy_pass         $ddm_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # Critical for SSE: disable all nginx buffering so events reach the client immediately.
    proxy_buffering         off;
    proxy_cache             off;
    proxy_read_timeout      3600s;   # Long-lived SSE connections
    proxy_connect_timeout   10s;
    chunked_transfer_encoding on;
  }

  location /api/ {
    set $ddm_backend "http://ddm-backend:8000";
    proxy_pass         $ddm_backend;
    proxy_http_version 1.1;

    # Forward the original client identity so FastAPI can log real IPs.
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Disable keep-alive header passthrough (backend manages its own pool).
    proxy_set_header   Connection        "";

    # Generous read timeout for compute-heavy simulation endpoints.
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    20s;
  }

  # ── Mission Control Dashboard ───────────────────────────────────────────────
  location = /mission-control {
    try_files /mission-control.html =404;
  }

  # ── Static demo HTML ────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /l6-ddm-demo.html;
  }

  # Keep dev-friendly no-cache for HTML / CSS / JS assets.
  location ~* \.(js|css|html)$ {
    add_header Cache-Control "no-store";
  }
}
