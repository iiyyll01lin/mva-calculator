services:
  mva-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      # Inherit proxy variables from the host shell automatically.
      # Values are left blank so Docker Compose reads them from the environment;
      # if a variable is unset on the host, the ARG simply has no value.
      args:
        http_proxy:
        https_proxy:
        no_proxy:
        HTTP_PROXY:
        HTTPS_PROXY:
        NO_PROXY:
    image: mva-app:latest
    container_name: mva-app
    ports:
      # Host port 8080 → container port 80 (nginx)
      - "8080:80"
    restart: unless-stopped
    environment:
      # Override at deploy time if needed, e.g. TZ=Asia/Taipei
      TZ: UTC
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
